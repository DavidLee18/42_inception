name: "inception"

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_name:
    file: ./secrets/db_name.txt
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  wp_admin_user:
    file: ./secrets/wp_admin_user.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  wp_admin_email:
    file: ./secrets/wp_admin_email.txt
  wp_user:
    file: ./secrets/wp_user.txt
  wp_user_password:
    file: ./secrets/wp_user_password.txt
  wp_user_email:
    file: ./secrets/wp_user_email.txt
  ftp_user:
    file: ./secrets/ftp_user.txt
  ftp_password:
    file: ./secrets/ftp_password.txt

services:
  mariadb:
    build:
      context: ./mariadb
    restart: unless-stopped
    secrets:
      - db_root_password
      - db_name
      - db_user
      - db_password
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
      MYSQL_DATABASE_FILE: /run/secrets/db_name
      MYSQL_USER_FILE: /run/secrets/db_user
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - db_data:/var/lib/mariadb
    networks:
      - limbo

  wordpress:
    build:
      context: ./wordpress
    restart: unless-stopped
    depends_on:
      - mariadb
      - redis
    secrets:
      - db_name
      - db_user
      - db_password
      - redis_password
      - wp_admin_user
      - wp_admin_password
      - wp_admin_email
      - wp_user
      - wp_user_password
      - wp_user_email
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME_FILE: /run/secrets/db_name
      WORDPRESS_DB_USER_FILE: /run/secrets/db_user
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      WP_ADMIN_USER_FILE: /run/secrets/wp_admin_user
      WP_ADMIN_PASSWORD_FILE: /run/secrets/wp_admin_password
      WP_ADMIN_EMAIL_FILE: /run/secrets/wp_admin_email
      WP_USER_FILE: /run/secrets/wp_user
      WP_USER_PASSWORD_FILE: /run/secrets/wp_user_password
      WP_USER_EMAIL_FILE: /run/secrets/wp_user_email
    volumes:
      - wp_data:/var/www/html
    networks:
      - limbo

  nginx:
    build:
      context: ./nginx
    restart: unless-stopped
    depends_on:
      - wordpress
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - wp_data:/var/www/html:ro
    networks:
      - limbo

  redis:
    build:
      context: ./redis
    restart: unless-stopped
    secrets:
      - redis_password
    environment:
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
    volumes:
      - redis_data:/data
    networks:
      - limbo

  ftp:
    build:
      context: ./ftp
    restart: unless-stopped
    secrets:
      - ftp_user
      - ftp_password
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      FTP_USER_FILE: /run/secrets/ftp_user
      FTP_PASSWORD_FILE: /run/secrets/ftp_password
    volumes:
      - wp_data:/var/www/html
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - limbo

  static:
    build:
      context: ./static
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - limbo

  adminer:
    build:
      context: ./adminer
    restart: unless-stopped
    depends_on:
      - mariadb
    ports:
      - "8081:8081"
    networks:
      - limbo

  monitoring:
    build:
      context: ./monitoring
    restart: unless-stopped
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      DOCKER_METRICS_HOST: ${DOCKER_METRICS_HOST}
    ports:
      - "9090:9090" # Prometheus
      - "3000:3000" # Grafana
    volumes:
      - prometheus_data:/var/lib/prometheus
      - grafana_data:/var/lib/grafana
    networks:
      - limbo

  cadvisor:
    build:
      context: ./cadvisor
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - limbo

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jaehylee/data/db
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jaehylee/data/wp
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  limbo:
    driver: bridge
