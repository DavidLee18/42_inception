name: "inception"

secrets:
  db_root_password:
    file: ./secrets/db_root_password.txt
  db_name:
    file: ./secrets/db_name.txt
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  wp_admin_user:
    file: ./secrets/wp_admin_user.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  wp_admin_email:
    file: ./secrets/wp_admin_email.txt
  wp_user:
    file: ./secrets/wp_user.txt
  wp_user_password:
    file: ./secrets/wp_user_password.txt
  wp_user_email:
    file: ./secrets/wp_user_email.txt
  ftp_user:
    file: ./secrets/ftp_user.txt
  ftp_password:
    file: ./secrets/ftp_password.txt

services:
  mariadb:
    image: mariadb:alpine3.22.4
    build:
      context: ./mariadb
    restart: unless-stopped
    secrets:
      - db_root_password
      - db_name
      - db_user
      - db_password
    volumes:
      - db_data:/var/lib/mariadb
    networks:
      - limbo
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:alpine3.22.4
    build:
      context: ./redis
    restart: unless-stopped
    secrets:
      - redis_password
    volumes:
      - redis_data:/data
    networks:
      - limbo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'redis-cli -a "$(cat /run/secrets/redis_password)" --no-auth-warning ping | grep -q PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  wordpress:
    image: wordpress:alpine3.22.4
    build:
      context: ./wordpress
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - db_name
      - db_user
      - db_password
      - redis_password
      - wp_admin_user
      - wp_admin_password
      - wp_admin_email
      - wp_user
      - wp_user_password
      - wp_user_email
    volumes:
      - wp_data:/var/www/html
    networks:
      - limbo
    healthcheck:
      test: ["CMD-SHELL", "php-fpm83 -t 2>/dev/null && nc -z 127.0.0.1 9000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:alpine3.22.4
    build:
      context: ./nginx
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html:ro
    networks:
      - limbo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- --no-check-certificate https://127.0.0.1/ >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  ftp:
    image: ftp:alpine3.22.4
    build:
      context: ./ftp
    restart: unless-stopped
    env_file:
      - .env
    secrets:
      - ftp_user
      - ftp_password
    volumes:
      - wp_data:/var/www/html
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    networks:
      - limbo
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 21"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  static:
    image: static:alpine3.22.4
    build:
      context: ./static
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - limbo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  adminer:
    image: adminer:alpine3.22.4
    build:
      context: ./adminer
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - limbo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8081/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  cadvisor:
    image: cadvisor:alpine3.22.4
    build:
      context: ./cadvisor
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - limbo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  monitoring:
    image: monitoring:alpine3.22.4
    build:
      context: ./monitoring
    restart: unless-stopped
    depends_on:
      cadvisor:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090" # Prometheus
      - "3000:3000" # Grafana
    volumes:
      - prometheus_data:/var/lib/prometheus
      - grafana_data:/var/lib/grafana
    networks:
      - limbo
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO /dev/null http://127.0.0.1:9090/-/healthy && wget -qO /dev/null http://127.0.0.1:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jaehylee/data/db
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jaehylee/data/wp
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  limbo:
    driver: bridge
