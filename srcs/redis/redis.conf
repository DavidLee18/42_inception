# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Require a password (read at startup via entrypoint — see note below)
# requirepass is set dynamically by the entrypoint

# Persistence — use RDB snapshots so the cache survives container restarts
# (set to "no" if you prefer a pure in-memory ephemeral cache)
save 900 1
save 300 10
save 60  10000
dir /data
dbfilename dump.rdb

# Memory policy: evict least-recently-used keys when memory is full
# (ideal for a WordPress object cache)
maxmemory 128mb
maxmemory-policy allkeys-lru

# Disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   ""
rename-command DEBUG    ""
rename-command SHUTDOWN ""
