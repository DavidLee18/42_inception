global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Docker daemon built-in metrics — covers all containers on the host
  - job_name: "docker"
    static_configs:
      # host-gateway resolves to the host machine from inside the container
      - targets: ["host-gateway:9323"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "docker-host"

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
