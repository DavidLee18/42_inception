# ── Authentication ───────────────────────────────────────────────────────────
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022
chroot_local_user=YES
allow_writeable_chroot=YES

# ── Logging ──────────────────────────────────────────────────────────────────
xferlog_enable=YES
xferlog_std_format=YES
log_ftp_protocol=YES
vsftpd_log_file=/dev/stdout

# ── Passive mode ─────────────────────────────────────────────────────────────
# Active mode is insecure and blocked by most firewalls; use passive only
listen=YES
listen_ipv6=NO
pasv_enable=YES
pasv_min_port=21100
pasv_max_port=21110
# Substituted at runtime by entrypoint.sh from $DOMAIN_NAME in .env
pasv_address=__DOMAIN_NAME__

# ── Performance & safety ─────────────────────────────────────────────────────
seccomp_sandbox=NO
